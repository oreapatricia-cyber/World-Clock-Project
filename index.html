<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>World Clocks</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <h1>World Clocks</h1>

      <div class="city-selector">
        <label for="city">Choose city</label>
        <select id="city">
          <option value="">Select a city…</option>
          <option value="los-angeles">Los Angeles</option>
          <option value="sydney">Sydney</option>
          <option value="tokyo">Tokyo</option>
          <option value="paris">Paris</option>
        </select>
      </div>

      <div class="cities">
        <div class="city">
          <div class="city-header">
            <span class="flag"></span>
            <h2>Los Angeles</h2>
          </div>
          <div class="date" id="la-date">August 15th 2022</div>
          <div class="time" id="la-time">1:48:15 AM</div>
        </div>

        <div class="city">
          <div class="city-header">
            <span class="flag"></span>
            <h2>Sydney</h2>
          </div>
          <div class="date" id="sydney-date">August 15th 2022</div>
          <div class="time" id="sydney-time">1:48:15 AM</div>
        </div>

        <div class="city">
          <div class="city-header">
            <span class="flag"></span>
            <h2>Tokyo</h2>
          </div>
          <div class="date" id="tokyo-date">August 15th 2022</div>
          <div class="time" id="tokyo-time">1:48:15 AM</div>
        </div>

        <div class="city">
          <div class="city-header">
            <span class="flag"></span>
            <h2>Paris</h2>
          </div>
          <div class="date" id="paris-date">August 15th 2022</div>
          <div class="time" id="paris-time">1:48:15 AM</div>
        </div>
      </div>
    </div>

    <script src="index.js"></script>
  </body>
</html>
