<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>World Clock</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.6.0/moment-timezone-with-data-1970-2030.min.js"></script>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <h1>World Clock</h1>

      <div class="city-selector">
        <label for="city">Choose City</label>
        <select id="city">
          <option value="">Select a city…</option>
          <option value="current">Current Location</option>
          <option value="America/Los_Angeles">Los Angeles</option>
          <option value="Australia/Sydney">Sydney</option>
          <option value="Asia/Tokyo">Tokyo</option>
          <option value="Europe/Paris">Paris</option>
        </select>
      </div>

      <!-- Homepage clocks -->
      <div id="homepage">
        <div class="city">
          <div class="city-info">
            <h2>Los Angeles</h2>
            <div class="date" id="la-date"></div>
          </div>
          <div class="time" id="la-time"></div>
        </div>

        <div class="city">
          <div class="city-info">
            <h2>Tokyo</h2>
            <div class="date" id="tokyo-date"></div>
          </div>
          <div class="time" id="tokyo-time"></div>
        </div>

        <div class="city">
          <div class="city-info">
            <h2>Paris</h2>
            <div class="date" id="paris-date"></div>
          </div>
          <div class="time" id="paris-time"></div>
        </div>
      </div>

      <!-- Selected city -->
      <div id="selected-city" class="cities"></div>

      <!-- Back link -->
      <a href="#" id="back-home" class="back-home">← Back to homepage</a>
    </div>

    <footer>
      This project was coded by Patricia J. Orea
      <a
        href="https://github.com/oreapatricia-cyber/World-Clock-Project"
        target="_blank"
      >
        open Source on Github
      </a>
      and hosted on Netlify
    </footer>

    <script src="index.js"></script>
  </body>
</html>
