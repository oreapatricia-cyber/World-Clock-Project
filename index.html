<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>World Clock</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.6.0/moment-timezone-with-data-1970-2030.min.js"></script>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <h1>World Clock</h1>

      <div class="city-selector">
        <label for="city">Choose City</label>
        <select id="city">
          <option value="">Select a city…</option>
          <option value="current">Current Location</option>
          <option value="America/Los_Angeles">Los Angeles</option>
          <option value="Australia/Sydney">Sydney</option>
          <option value="Asia/Tokyo">Tokyo</option>
          <option value="Europe/Paris">Paris</option>
        </select>
      </div>

      <div class="cities">
        <div class="city">
          <div class="city-info">
            <div class="city-header">
              <h2>Los Angeles</h2>
            </div>
            <div class="date" id="la-date">August 15th 2022</div>
          </div>
          <div class="time" id="la-time">1:48:15 AM</div>
        </div>

        <div class="city">
          <div class="city-info">
            <div class="city-header">
              <h2>Sydney</h2>
            </div>
            <div class="date" id="sydney-date">August 15th 2022</div>
          </div>
          <div class="time" id="sydney-time">1:48:15 AM</div>
        </div>

        <div class="city">
          <div class="city-info">
            <div class="city-header">
              <h2>Tokyo</h2>
            </div>
            <div class="date" id="tokyo-date">August 15th 2022</div>
          </div>
          <div class="time" id="tokyo-time">1:48:15 AM</div>
        </div>

        <div class="city">
          <div class="city-info">
            <div class="city-header">
              <h2>Paris</h2>
            </div>
            <div class="date" id="paris-date">August 15th 2022</div>
          </div>
          <div class="time" id="paris-time">1:48:15 AM</div>
        </div>
      </div>
    </div>

    <script src="index.js"></script>
  </body>
</html>
