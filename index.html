<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>World Clock</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.6.0/moment-timezone-with-data-1970-2030.min.js"></script>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <h1>World Clock</h1>

      <div class="city-selector">
        <label for="city">Choose City</label>
        <select id="city">
          <option value="">Select a city…</option>
          <option value="current">Current Location</option>
          <option value="America/Los_Angeles">Los Angeles</option>
          <option value="Australia/Sydney">Sydney</option>
          <option value="Asia/Tokyo">Tokyo</option>
          <option value="Europe/Paris">Paris</option>
        </select>
      </div>
      <div class="cities"></div>
    </div>
    <footer>
      This project was coded by Patricia J. Orea and
      <a
        href="https://github.com/oreapatricia-cyber/World-Clock-Project"
        target="_blank"
      >
        open Source on Github</a
      >
      and <a href=""></a>
    </footer>

    <script src="index.js"></script>
  </body>
</html>
